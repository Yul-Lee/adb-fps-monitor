plugins {
    id 'com.android.application'
}

android {
    namespace 'com.adbmonitor.companion'
    compileSdk 34

    defaultConfig {
        applicationId "com.adbmonitor.companion"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "0.0.1 Alpha"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
}
